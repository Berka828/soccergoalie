<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2-Minute Goalkeeper Challenge</title>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose/pose.js" crossorigin="anonymous"></script>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: #111;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        #game-container {
            position: relative;
            width: 1280px;
            height: 720px;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 20px 50px rgba(0,0,0,0.8);
            background-color: #000;
        }
        video {
            display: none;
        }
        canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 2;
        }
        #ui-overlay {
            position: absolute;
            top: 20px;
            left: 0;
            right: 0;
            display: flex;
            justify-content: space-around;
            align-items: center;
            padding: 0 40px;
            z-index: 10;
            pointer-events: none;
        }
        .ui-box {
            background: rgba(0, 0, 0, 0.75);
            backdrop-filter: blur(8px);
            padding: 12px 30px;
            border-radius: 12px;
            color: #fff;
            font-weight: 800;
            font-size: 1.6rem;
            border-bottom: 4px solid rgba(255,255,255,0.2);
            text-shadow: 1px 1px 3px rgba(0,0,0,0.8);
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }
        #timer-box {
            font-size: 2rem;
            padding: 15px 40px;
            border-bottom-color: #ff9800;
        }
        #score { color: #81c784; }
        #streak { color: #ffeb3b; }
        #goals { color: #e57373; }

        #game-over-screen {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.85);
            backdrop-filter: blur(10px);
            z-index: 100;
            display: none; /* Initially hidden */
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
            text-align: center;
        }
        #game-over-screen h1 {
            font-size: 5rem;
            margin: 0;
            text-transform: uppercase;
            color: #f44336;
            text-shadow: 0 0 15px #f44336;
        }
        #game-over-screen p {
            font-size: 2rem;
            margin: 10px 0;
        }
        #play-again-btn {
            margin-top: 30px;
            padding: 20px 50px;
            font-size: 1.5rem;
            font-weight: bold;
            color: white;
            background: #4caf50;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            text-transform: uppercase;
            box-shadow: 0 5px 15px rgba(76, 175, 80, 0.4);
            transition: all 0.2s ease;
        }
        #play-again-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(76, 175, 80, 0.6);
        }
    </style>
</head>
<body>

    <div id="game-container">
        <video id="webcam" autoplay playsinline muted></video>
        <canvas id="gameCanvas"></canvas>

        <div id="ui-overlay">
            <div class="ui-box">SCORE: <span id="score">0</span></div>
            <div id="timer-box" class="ui-box">TIME: <span id="time">120</span></div>
            <div class="ui-box">STREAK: <span id="streak">0</span></div>
        </div>

        <div id="game-over-screen">
            <h1>Game Over</h1>
            <p>Final Score: <span id="final-score">0</span></p>
            <p>Best Streak: <span id="final-streak">0</span></p>
            <button id="play-again-btn">Play Again</button>
        </div>
    </div>

let ball = { x: 0, y: 0, radius: 15, speedX: 0, speedY: 4, sizeGrowth: 0.1, active: false };

function resizeCanvases() {
    canvasElement.width = 1280;
    canvasElement.height = 720;
    offscreenCanvas.width = 1280;
    offscreenCanvas.height = 720;
}
resizeCanvases();

function spawnBall() {
    ball.active = true;
    ball.radius = 5; // Start very small
    ball.x = canvasElement.width / 2 + (Math.random() - 0.5) * 300;
    ball.y = canvasElement.height * 0.65; // Spawn near the goal line in the image
    ball.speedX = (Math.random() - 0.5) * 10;
    // Speed increases in the second minute
    const speedMultiplier = timeLeft < 60 ? 1.5 : 1;
    ball.speedY = (gameConfig.ballBaseSpeed + Math.random() * 2) * speedMultiplier;
    ball.sizeGrowth = 0.12;
}

function updateGame() {
    if (!ball.active && gameState === 'playing') {
        setTimeout(spawnBall, 1200);
        ball.active = 'spawning';
    }

    if (ball.active === true) {
        ball.x += ball.speedX;
        ball.y += ball.speedY;
        ball.radius += ball.sizeGrowth * ball.speedY;

        let saved = false;
        for (const part in contactPoints) {
            if (contactPoints[part].x) {
                let dist = Math.hypot(ball.x - contactPoints[part].x, ball.y - contactPoints[part].y);
                if (dist < ball.radius + 35) {
                    saved = true;
                    triggerFx("#4caf50", contactPoints[part].x, contactPoints[part].y);
                    break;
                }
            }
        }

        if (saved) {
            score += 10 + (streak * 2);
            streak++;
            if (streak > bestStreak) bestStreak = streak;
            updateUI();
            ball.active = false;
        } else if (ball.y > canvasElement.height + ball.radius) {
            streak = 0;
            triggerFx("#f44336");
            updateUI();
            ball.active = false;
        }
    }

    for (let i = particles.length - 1; i >= 0; i--) {
        const p = particles[i];
        p.x += p.vx; p.y += p.vy;
        p.alpha -= 0.03;
        if (p.alpha <= 0) particles.splice(i, 1);
    }
}

function drawGame(segmentationMask) {
    canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height);
    if (bgImg.complete) {
        canvasCtx.drawImage(bgImg, 0, 0, canvasElement.width, canvasElement.height);
    }

    if (segmentationMask) {
        offscreenCtx.save();
        offscreenCtx.clearRect(0, 0, offscreenCanvas.width, offscreenCanvas.height);
        offscreenCtx.translate(offscreenCanvas.width, 0);
        offscreenCtx.scale(-1, 1);
        offscreenCtx.drawImage(segmentationMask, 0, 0, offscreenCanvas.width, offscreenCanvas.height);
        offscreenCtx.globalCompositeOperation = 'source-in';
        offscreenCtx.drawImage(videoElement, 0, 0, offscreenCanvas.width, offscreenCanvas.height);
        offscreenCtx.restore();
        canvasCtx.drawImage(offscreenCanvas, 0, 0, canvasElement.width, canvasElement.height);
    }

    if (ball.active === true) {
        canvasCtx.save();
        canvasCtx.translate(ball.x, ball.y);
        canvasCtx.rotate(ball.y * 0.05);
        canvasCtx.drawImage(ballImg, -ball.radius, -ball.radius, ball.radius * 2, ball.radius * 2);
        canvasCtx.restore();
    }

    particles.forEach(p => {
        canvasCtx.save();
        canvasCtx.globalAlpha = p.alpha;
        canvasCtx.fillStyle = p.color;
        canvasCtx.beginPath();
        canvasCtx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
        canvasCtx.fill();
        canvasCtx.restore();
    });
}

function updateUI() {
    scoreEl.innerText = score;
    streakEl.innerText = streak;
}

function triggerFx(color, x, y) {
    if (x && y) {
        for (let i = 0; i < 25; i++) {
            particles.push({
                x: x, y: y,
                vx: (Math.random() - 0.5) * 12, vy: (Math.random() - 0.5) * 12,
                size: Math.random() * 6 + 3, color: color, alpha: 1
            });
        }
    } else {
        document.getElementById('game-container').style.outline = `8px solid ${color}`;
        setTimeout(() => document.getElementById('game-container').style.outline = 'none', 200);
    }
}

function startGame() {
    gameState = 'playing';
    score = 0;
    streak = 0;
    bestStreak = 0;
    timeLeft = 120;
    ball.active = false;
    gameOverScreen.style.display = 'none';
    updateUI();
    timeEl.innerText = timeLeft;
    timerBoxEl.style.borderColor = '#ff9800';

    gameTimer = setInterval(() => {
        timeLeft--;
        timeEl.innerText = timeLeft;
        if (timeLeft < 60 && timeLeft > 10) {
            timerBoxEl.style.borderColor = '#fdd835'; // Yellow warning
        } else if (timeLeft <= 10) {
            timerBoxEl.style.borderColor = '#e53935'; // Red critical
        }

        if (timeLeft <= 0) {
            endGame();
        }
    }, 1000);

    setTimeout(spawnBall, 1000); // Start the first ball
}

function endGame() {
    clearInterval(gameTimer);
    gameState = 'over';
    ball.active = false;
    finalScoreEl.innerText = score;
    finalStreakEl.innerText = bestStreak;
    gameOverScreen.style.display = 'flex';
}

playAgainBtn.addEventListener('click', startGame);

function onResults(results) {
    drawGame(results.segmentationMask);

    if (gameState === 'playing' && results.poseLandmarks) {
        updateGame();
        const w = canvasElement.width, h = canvasElement.height;
        const landmarks = results.poseLandmarks;
        const getCoords = (index) => ({ x: (1 - landmarks[index].x) * w, y: landmarks[index].y * h });
        contactPoints = {
            left_wrist: getCoords(15), right_wrist: getCoords(16),
            left_elbow: getCoords(13), right_elbow: getCoords(14),
            left_shoulder: getCoords(11), right_shoulder: getCoords(12),
            head: getCoords(0), left_knee: getCoords(25), right_knee: getCoords(26)
        };
    }
}

const pose = new Pose({ locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/pose/${file}` });
pose.setOptions({
    modelComplexity: 1, smoothLandmarks: true, enableSegmentation: true,
    smoothSegmentation: true, minDetectionConfidence: 0.5, minTrackingConfidence: 0.5
});
pose.onResults(onResults);
