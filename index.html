<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Goalkeeper Challenge</title>
    
    <!-- Pinned stable MediaPipe CDN scripts -->
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils@0.3.1675466862/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose@0.5.1675469404/pose.js" crossorigin="anonymous"></script>
    
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; overflow: hidden; }
        
        #game-container {
            position: relative; width: 100vw; height: 100vh;
            background-color: #222;
        }

        #webcam {
            position: absolute; top: 0; left: 0; 
            width: 100%; height: 100%; object-fit: cover;
            z-index: 1; opacity: 0.01; /* Invisible but running */
            pointer-events: none;
        }

        canvas {
            position: absolute; top: 0; left: 0;
            width: 100%; height: 100%; z-index: 2;
        }

        .overlay-screen {
            position: absolute; top: 0; left: 0; right: 0; bottom: 0;
            z-index: 100; color: white; display: flex; flex-direction: column;
            justify-content: center; align-items: center; text-align: center;
            background: rgba(0,0,0,0.85); backdrop-filter: blur(10px);
        }

        #ui-overlay {
            position: absolute; top: 0; left: 0; right: 0;
            z-index: 10; display: none; justify-content: space-around;
            padding-top: 20px; pointer-events: none;
        }

        .ui-box {
            background: rgba(0, 0, 0, 0.75); backdrop-filter: blur(8px);
            padding: 12px 30px; border-radius: 12px;
            font-weight: 800; font-size: 1.6rem; color: white;
            border-bottom: 4px solid #fff;
            text-shadow: 1px 1px 3px rgba(0,0,0,0.8);
        }

        #timer-box {
            font-size: 2rem; padding: 15px 40px;
            border-bottom-color: #ff9800; transition: border-color 0.5s ease;
        }

        .action-btn {
            margin-top: 30px; padding: 20px 50px; font-size: 1.5rem;
            font-weight: bold; color: white; background: #4caf50;
            border: none; border-radius: 12px; cursor: pointer;
            text-transform: uppercase; box-shadow: 0 5px 15px rgba(76, 175, 80, 0.4);
            transition: all 0.2s ease;
        }
        .action-btn:hover { transform: translateY(-3px); box-shadow: 0 8px 20px rgba(76, 175, 80, 0.6); }

        #diagnostics {
            position: absolute; bottom: 10px; right: 10px;
            background: rgba(0, 0, 0, 0.8); color: #888;
            padding: 8px 12px; font-size: 0.8rem; font-family: monospace;
            border-radius: 5px; z-index: 150; max-width: 300px; text-align: left;
        }
        
        #game-over-screen { display: none; }
        #game-over-screen h1 { font-size: 5rem; margin: 0; color: #f44336; }
        #game-over-screen p { font-size: 2rem; margin: 10px 0; }
    </style>
</head>
<body>
    <div id="game-container">
        <video id="webcam" autoplay playsinline muted></video>
        <canvas id="gameCanvas"></canvas>

        <div id="ui-overlay">
            <div class="ui-box">SCORE: <span id="score">0</span></div>
            <div id="timer-box" class="ui-box">TIME: <span id="time">120</span></div>
            <div class="ui-box">STREAK: <span id="streak">0</span></div>
        </div>

        <!-- Start Screen -->
        <div id="start-screen" class="overlay-screen">
            <h1 style="font-size: 3.5rem; margin-bottom: 10px; letter-spacing: 2px;">GOALKEEPER CHALLENGE</h1>
            <p style="font-size: 1.3rem; max-width: 600px;">Defend the goal with your body for 2 minutes! Keepers stand back so the camera sees your hands and head.</p>
            <button id="start-btn" class="action-btn">Start Game</button>
        </div>

        <!-- Loading Screen -->
        <div id="loading-screen" class="overlay-screen">
            <h2>Warming up AI...</h2>
            <p>Initializing camera and body tracking models.</p>
        </div>

        <!-- Game Over Screen -->
        <div id="game-over-screen" class="overlay-screen">
            <h1>Game Over</h1>
            <p>Final Score: <span id="final-score">0</span></p>
            <p>Best Streak: <span id="final-streak">0</span></p>
            <button id="play-again-btn" class="action-btn">Play Again</button>
        </div>

        <!-- Diagnostic Box -->
        <div id="diagnostics">Status: Waiting to start...</div>
    </div>

<script>
    const videoElement = document.getElementById('webcam');
    const canvasElement = document.getElementById('gameCanvas');
    const canvasCtx = canvasElement.getContext('2d');
    
    const offscreenCanvas = document.createElement('canvas');
    const offscreenCtx = offscreenCanvas.getContext('2d');

    const ui = {
        score: document.getElementById('score'),
        streak: document.getElementById('streak'),
        time: document.getElementById('time'),
        timerBox: document.getElementById('timer-box'),
        startScreen: document.getElementById('start-screen'),
        loadingScreen: document.getElementById('loading-screen'),
        gameOver: document.getElementById('game-over-screen'),
        uiOverlay: document.getElementById('ui-overlay'),
        finalScore: document.getElementById('final-score'),
        finalStreak: document.getElementById('final-streak'),
        startBtn: document.getElementById('start-btn'),
        playAgainBtn: document.getElementById('play-again-btn'),
        diag: document.getElementById('diagnostics')
    };

    let state = {
        score: 0, streak: 0, bestStreak: 0, timeLeft: 120,
        gameStatus: 'idle', 
        contactPoints: {},
        rawSkeleton: null,
        playerCutout: null,
        gameTimer: null,
        isBallActive: false
    };

    let ball = {};

    const bgImg = new Image();
    bgImg.src = 'soccerfifabg.png';

    const ballImg = new Image();
    ballImg.src = 'data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><circle cx="50" cy="50" r="48" fill="%23fff" stroke="%23000" stroke-width="4"/><path d="M50 20 L30 40 L40 70 L60 70 L70 40 Z" fill="%23111"/><line x1="50" y1="20" x2="50" y2="2" stroke="%23111" stroke-width="5"/><line x1="30" y1="40" x2="5" y2="30" stroke="%23111" stroke-width="5"/><line x1="70" y1="40" x2="95" y2="30" stroke="%23111" stroke-width="5"/><line x1="40" y1="70" x2="25" y2="95" stroke="%23111" stroke-width="5"/><line x1="60" y1="70" x2="75" y2="95" stroke="%23111" stroke-width="5"/></svg>';

    function setDiag(status) {
        ui.diag.innerText = `Status: ${status}`;
        console.log(status);
    }

    // --- GAME PHYSICS & SPAWNING ---
    function spawnBall() {
        if (state.gameStatus !== 'playing') return;
        state.isBallActive = true;
        ball = {
            state: 'incoming', radius: 5,
            x: canvasElement.width / 2 + (Math.random() - 0.5) * 300,
            y: canvasElement.height * 0.40,
            speedX: (Math.random() - 0.5) * 12,
            speedY: (5 + Math.random() * 3) * (state.timeLeft < 60 ? 1.4 : 1),
            sizeGrowth: 0.15, rotation: 0
        };
    }

    function updatePhysics() {
        if (!state.isBallActive) {
            state.isBallActive = true;
            setTimeout(spawnBall, 1000);
            return;
        }

        if (ball.state === 'incoming') {
            ball.x += ball.speedX; ball.y += ball.speedY;
            ball.radius += ball.sizeGrowth * ball.speedY;
            ball.rotation += 0.1;

            let hit = false;
            let hitX = 0;
            
            for (const part in state.contactPoints) {
                const pt = state.contactPoints[part];
                if (pt && Math.hypot(ball.x - pt.x, ball.y - pt.y) < ball.radius + 35) {
                    hit = true;
                    hitX = pt.x;
                    break;
                }
            }

            if (hit) {
                ball.state = 'deflected';
                ball.speedY = -Math.abs(ball.speedY * 0.7); // Bounce away
                ball.speedX = (ball.x - hitX) * 0.15; // Side deflection angle
                
                state.score += 10 + (state.streak * 2);
                state.streak++;
                if (state.streak > state.bestStreak) state.bestStreak = state.streak;
                
                document.getElementById('game-container').style.outline = `8px solid #4caf50`;
                setTimeout(() => document.getElementById('game-container').style.outline = 'none', 200);
            } else if (ball.y > canvasElement.height + ball.radius) {
                state.streak = 0;
                document.getElementById('game-container').style.outline = `8px solid #f44336`;
                setTimeout(() => document.getElementById('game-container').style.outline = 'none', 200);
                state.isBallActive = false;
                ball = {};
            }
        } else if (ball.state === 'deflected') {
            ball.x += ball.speedX; ball.y += ball.speedY;
            ball.radius -= ball.sizeGrowth * Math.abs(ball.speedY) * 1.5;
            ball.rotation -= 0.1;
            if (ball.radius < 2 || ball.y < 0) {
                state.isBallActive = false;
                ball = {};
            }
        }
        
        ui.score.innerText = state.score;
        ui.streak.innerText = state.streak;
    }

    // --- DRAWING ---
    function draw() {
        canvasElement.width = window.innerWidth;
        canvasElement.height = window.innerHeight;
        offscreenCanvas.width = canvasElement.width;
        offscreenCanvas.height = canvasElement.height;

        canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height);
        
        // 1. Draw Stadium Background
        if (bgImg.complete && bgImg.naturalHeight !== 0) {
            canvasCtx.drawImage(bgImg, 0, 0, canvasElement.width, canvasElement.height);
        } else {
            canvasCtx.fillStyle = "#222";
            canvasCtx.fillRect(0, 0, canvasElement.width, canvasElement.height);
        }

        // 2. Draw Player Cutout (Mirrored) OR fallback to styled bones
        if (state.playerCutout && state.gameStatus === 'playing') {
            canvasCtx.save();
            canvasCtx.translate(canvasElement.width, 0);
            canvasCtx.scale(-1, 1);
            canvasCtx.drawImage(state.playerCutout, 0, 0, canvasElement.width, canvasElement.height);
            canvasCtx.restore();
        } else if (state.rawSkeleton && state.gameStatus === 'playing') {
            // FALLBACK SYSTEM: Draw a bright neon goalkeeper skeleton if segmentation fails or is slow
            canvasCtx.save();
            canvasCtx.strokeStyle = '#4caf50';
            canvasCtx.lineWidth = 8;
            canvasCtx.lineCap = 'round';
            canvasCtx.shadowBlur = 15;
            canvasCtx.shadowColor = '#4caf50';
            
            // Draw a simplified goalkeeper head, shoulders, arms, knees
            const pts = state.contactPoints;
            if (pts.head) {
                canvasCtx.beginPath();
                canvasCtx.arc(pts.head.x, pts.head.y, 25, 0, Math.PI * 2);
                canvasCtx.stroke();
            }
            if (pts.ls && pts.rs) {
                canvasCtx.beginPath();
                canvasCtx.moveTo(pts.ls.x, pts.ls.y);
                canvasCtx.lineTo(pts.rs.x, pts.rs.y);
                canvasCtx.stroke();
            }
            if (pts.ls && pts.le && pts.lw) {
                canvasCtx.beginPath();
                canvasCtx.moveTo(pts.ls.x, pts.ls.y);
                canvasCtx.lineTo(pts.le.x, pts.le.y);
                canvasCtx.lineTo(pts.lw.x, pts.lw.y);
                canvasCtx.stroke();
            }
            if (pts.rs && pts.re && pts.rw) {
                canvasCtx.beginPath();
                canvasCtx.moveTo(pts.rs.x, pts.rs.y);
                canvasCtx.lineTo(pts.re.x, pts.re.y);
                canvasCtx.lineTo(pts.rw.x, pts.rw.y);
                canvasCtx.stroke();
            }
            canvasCtx.restore();
        }

        // 3. Draw Ball
        if (ball.active && ball.radius > 0) {
            canvasCtx.save();
            canvasCtx.translate(ball.x, ball.y);
            canvasCtx.rotate(ball.rotation);
            canvasCtx.drawImage(ballImg, -ball.radius, -ball.radius, ball.radius * 2, ball.radius * 2);
            canvasCtx.restore();
        }

        if (state.gameStatus === 'playing') {
            updatePhysics();
        }

        requestAnimationFrame(draw);
    }

    // --- AI RESULTS & STATE TRANSITION ---
    function onPoseResults(results) {
        if (state.gameStatus === 'loading') {
            state.gameStatus = 'playing';
            ui.loadingScreen.style.display = 'none';
            ui.uiOverlay.style.display = 'flex';
            startGameplay();
        }

        const w = canvasElement.width;
        const h = canvasElement.height;

        // Process Player Cutout (Background Removal)
        if (results.segmentationMask) {
            setDiag("Removing background...");
            offscreenCtx.save();
            offscreenCtx.clearRect(0, 0, w, h);
            offscreenCtx.translate(w, 0);
            offscreenCtx.scale(-1, 1);
            offscreenCtx.drawImage(results.segmentationMask, 0, 0, w, h);
            offscreenCtx.globalCompositeOperation = 'source-in';
            offscreenCtx.drawImage(results.image, 0, 0, w, h);
            offscreenCtx.restore();
            state.playerCutout = offscreenCanvas;
        } else {
            // Fallback - just save the raw landmarks so we can draw the skeleton
            state.playerCutout = null;
        }

        // Map Body parts for collision & fallback drawing (always mirrored)
        if (results.poseLandmarks) {
            state.rawSkeleton = results.poseLandmarks;
            const getCoords = (index) => {
                const lm = results.poseLandmarks[index];
                if (!lm || lm.visibility < 0.5) return null;
                return { x: (1 - lm.x) * w, y: lm.y * h };
            };
            
            state.contactPoints = {
                lw: getCoords(15), rw: getCoords(16), 
                le: getCoords(13), re: getCoords(14),
                ls: getCoords(11), rs: getCoords(12), 
                head: getCoords(0), 
                lk: getCoords(25), rk: getCoords(26)
            };
        } else {
            state.rawSkeleton = null;
            state.contactPoints = {};
        }
    }

    // --- INITIALIZATION & NATIVE CAMERA ---
    async function initSystem() {
        ui.startScreen.style.display = 'none';
        ui.loadingScreen.style.display = 'flex';
        setDiag("Requesting camera permissions...");

        try {
            // 1. Request Native Video
            const stream = await navigator.mediaDevices.getUserMedia({ 
                video: { width: 1280, height: 720, facingMode: "user" } 
            });
            videoElement.srcObject = stream;
            setDiag("Camera connected!");
            
            // 2. Initialize MediaPipe
            const poseAI = new Pose({ locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/pose@0.5.1675469404/${file}` });
            
            // Fallback config: we'll try to use segmentation, but won't crash if browser lacks WebGL support
            poseAI.setOptions({
                modelComplexity: 1, 
                smoothLandmarks: true, 
                enableSegmentation: true, 
                smoothSegmentation: true, 
                minDetectionConfidence: 0.5, 
                minTrackingConfidence: 0.5
            });
            poseAI.onResults(onPoseResults);

            videoElement.onloadeddata = () => {
                videoElement.play();
                state.gameStatus = 'loading';
                setDiag("Video playing, starting AI loop...");
                
                // Custom frame delivery loop
                const camera = new Camera(videoElement, {
                    onFrame: async () => {
                        await poseAI.send({ image: videoElement });
                    },
                    width: 1280, height: 720
                });
                camera.start();
            };

        } catch (err) {
            setDiag("FAILED: " + err.message);
            alert("Error activating camera. Details: " + err.message);
            ui.startScreen.style.display = 'flex';
            ui.loadingScreen.style.display = 'none';
        }
    }

    function startGameplay() {
        state.score = 0; state.streak = 0; state.timeLeft = 120;
        state.isBallActive = false; ball = {};
        
        if (state.gameTimer) clearInterval(state.gameTimer);
        state.gameTimer = setInterval(() => {
            state.timeLeft--;
            ui.time.innerText = state.timeLeft;
            if (state.timeLeft <= 0) {
                clearInterval(state.gameTimer);
                state.gameStatus = 'over';
                ui.uiOverlay.style.display = 'none';
                ui.gameOver.style.display = 'flex';
                ui.finalScore.innerText = state.score;
                ui.finalStreak.innerText = state.bestStreak;
                setDiag("Game Over");
            }
        }, 1000);
    }

    // Bind click events
    ui.startBtn.addEventListener('click', initSystem);
    ui.playAgainBtn.addEventListener('click', () => {
        ui.gameOver.style.display = 'none';
        ui.uiOverlay.style.display = 'flex';
        state.gameStatus = 'playing';
        startGameplay();
    });

    // Start rendering engine immediately
    requestAnimationFrame(draw);
</script>
</body>
</html>
