<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pro Webcam Goalkeeper</title>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose/pose.js" crossorigin="anonymous"></script>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: #111;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        #game-container {
            position: relative;
            width: 1280px;
            height: 720px;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 20px 50px rgba(0,0,0,0.8);
            background-color: #000;
        }
        /* Hide the raw video feed, we will draw the cut-out player on the canvas */
        video {
            display: none; 
        }
        canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 2;
        }
        #ui-overlay {
            position: absolute;
            top: 20px;
            left: 0;
            right: 0;
            display: flex;
            justify-content: space-around;
            padding: 0 40px;
            z-index: 10;
            pointer-events: none;
        }
        .ui-box {
            background: rgba(0, 0, 0, 0.75);
            backdrop-filter: blur(8px);
            padding: 12px 30px;
            border-radius: 12px;
            color: #fff;
            font-weight: 800;
            font-size: 1.6rem;
            border-bottom: 4px solid rgba(255,255,255,0.2);
            text-shadow: 1px 1px 3px rgba(0,0,0,0.8);
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }
        #score { color: #4caf50; }
        #streak { color: #ffeb3b; }
        #goals { color: #f44336; }
        
        #settings-panel {
            position: absolute;
            bottom: 20px;
            left: 20px;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(8px);
            padding: 15px 20px;
            border-radius: 12px;
            z-index: 11;
            color: white;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .slider-container {
            margin-top: 12px;
            display: flex;
            flex-direction: column;
        }
        .slider-container label {
            font-size: 0.9rem;
            margin-bottom: 6px;
            font-weight: bold;
        }
        input[type=range] {
            accent-color: #4caf50;
        }
    </style>
</head>
<body>

    <div id="game-container">
        <!-- Added muted and playsinline for better browser compatibility -->
        <video id="webcam" autoplay playsinline muted></video>
        <canvas id="gameCanvas"></canvas>

        <div id="ui-overlay">
            <div id="score-box" class="ui-box">SCORE: <span id="score">0</span></div>
            <div id="streak-box" class="ui-box">STREAK: <span id="streak">0</span></div>
            <div id="goals-box" class="ui-box">MISSED: <span id="goals">0</span></div>
        </div>

        <div id="settings-panel">
            <strong style="font-size: 1.1rem;">Game Settings</strong>
            <div class="slider-container">
                <label for="ballSpeed">Ball Speed</label>
                <input type="range" id="ballSpeed" min="1" max="12" value="5">
            </div>
            <div class="slider-container">
                <label for="cameraOpacity">Player Opacity</label>
                <input type="range" id="cameraOpacity" min="0" max="1" step="0.1" value="1.0">
            </div>
        </div>
    </div>

<script>
const videoElement = document.getElementById('webcam');
const canvasElement = document.getElementById('gameCanvas');
const canvasCtx = canvasElement.getContext('2d');

// We use an offscreen canvas to cleanly cut out the player
const offscreenCanvas = document.createElement('canvas');
const offscreenCtx = offscreenCanvas.getContext('2d');

const scoreEl = document.getElementById('score');
const streakEl = document.getElementById('streak');
const goalsEl = document.getElementById('goals');
const ballSpeedSlider = document.getElementById('ballSpeed');
const cameraOpacitySlider = document.getElementById('cameraOpacity');

let score = 0;
let streak = 0;
let goals = 0;

let contactPoints = {};
const particles = [];
let gameConfig = {
    ballBaseSpeed: 5,
    cameraOpacity: 1.0 // Default to fully visible now that background is removed
};

// Setup Background Image
const bgImg = new Image();
bgImg.src = 'soccerfifabg.png';

// Setup Reliable SVG Soccer Ball
const ballImg = new Image();
const svgSoccerBall = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><circle cx="50" cy="50" r="48" fill="#fff" stroke="#000" stroke-width="3"/><polygon points="50,22 25,40 35,70 65,70 75,40" fill="#222"/><line x1="50" y1="22" x2="50" y2="2" stroke="#222" stroke-width="4"/><line x1="25" y1="40" x2="4" y2="30" stroke="#222" stroke-width="4"/><line x1="75" y1="40" x2="96" y2="30" stroke="#222" stroke-width="4"/><line x1="35" y1="70" x2="20" y2="92" stroke="#222" stroke-width="4"/><line x1="65" y1="70" x2="80" y2="92" stroke="#222" stroke-width="4"/><polygon points="50,2 35,0 65,0" fill="#222"/><polygon points="4,30 0,45 0,15" fill="#222"/><polygon points="96,30 100,45 100,15" fill="#222"/><polygon points="20,92 10,100 40,100" fill="#222"/><polygon points="80,92 90,100 60,100" fill="#222"/></svg>`;
ballImg.src = 'data:image/svg+xml;charset=utf-8,' + encodeURIComponent(svgSoccerBall);

// Game state variables
let ball = { x: 0, y: 0, radius: 15, speedX: 0, speedY: 4, sizeGrowth: 0.1, active: false };

function resizeCanvases() {
    canvasElement.width = 1280;
    canvasElement.height = 720;
    offscreenCanvas.width = 1280;
    offscreenCanvas.height = 720;
}
resizeCanvases();

cameraOpacitySlider.addEventListener('input', (e) => {
    gameConfig.cameraOpacity = parseFloat(e.target.value);
});
ballSpeedSlider.addEventListener('input', (e) => {
    gameConfig.ballBaseSpeed = parseFloat(e.target.value);
});

function spawnBall() {
    ball.x = canvasElement.width / 2;
    ball.y = canvasElement.height * 0.3; // Spawn slightly higher
    ball.radius = 12;
    ball.speedX = (Math.random() - 0.5) * 14;
    ball.speedY = gameConfig.ballBaseSpeed + Math.random() * 4;
    ball.sizeGrowth = 0.08;
    ball.active = true;
}

function updateGame() {
    if (!ball.active) {
        setTimeout(spawnBall, 1200); 
        ball.active = 'spawning'; 
    }

    if (ball.active === true) {
        ball.x += ball.speedX;
        ball.y += ball.speedY;
        ball.radius += ball.sizeGrowth * ball.speedY;

        let saved = false;
        // Collision Detection for ALL mapped body parts
        for (const part in contactPoints) {
            if (contactPoints[part].x) {
                let dist = Math.hypot(ball.x - contactPoints[part].x, ball.y - contactPoints[part].y);
                // Dynamically adjust hit box based on ball's 3D perspective size
                if (dist < ball.radius + 35) { 
                    saved = true;
                    // Trigger visual pop at exact point of impact
                    triggerFx("#4caf50", contactPoints[part].x, contactPoints[part].y);
                    break;
                }
            }
        }

        if (saved) {
            score += 10 + (streak * 2); // Multiplier for streaks
            streak++;
            updateUI();
            ball.active = false;
        } else if (ball.y > canvasElement.height + ball.radius) {
            goals++;
            streak = 0;
            triggerFx("#f44336");
            updateUI();
            ball.active = false;
        }
    }
    
    // Process particle physics
    for (let i = particles.length - 1; i >= 0; i--) {
        const p = particles[i];
        p.x += p.vx;
        p.y += p.vy;
        p.alpha -= 0.03;
        if (p.alpha <= 0) particles.splice(i, 1);
    }
}

function drawGame() {
    // Draw the spinning ball
    if (ball.active === true) {
        canvasCtx.save();
        canvasCtx.translate(ball.x, ball.y);
        canvasCtx.rotate(ball.y * 0.06); // Spin effect based on Y movement
        canvasCtx.drawImage(ballImg, -ball.radius, -ball.radius, ball.radius * 2, ball.radius * 2);
        canvasCtx.restore();
    }
    
    // Draw explosion particles
    particles.forEach(p => {
        canvasCtx.save();
        canvasCtx.globalAlpha = p.alpha;
        canvasCtx.fillStyle = p.color;
        canvasCtx.beginPath();
        canvasCtx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
        canvasCtx.fill();
        canvasCtx.restore();
    });
}

function updateUI() {
    scoreEl.innerText = score;
    streakEl.innerText = streak;
    goalsEl.innerText = goals;
}

function triggerFx(color, x, y) {
    if (x && y) { 
        for (let i = 0; i < 25; i++) {
            particles.push({
                x: x,
                y: y,
                vx: (Math.random() - 0.5) * 12,
                vy: (Math.random() - 0.5) * 12,
                size: Math.random() * 6 + 3,
                color: color,
                alpha: 1
            });
        }
    } else { 
        document.getElementById('game-container').style.outline = `8px solid ${color}`;
        setTimeout(() => document.getElementById('game-container').style.outline = 'none', 200);
    }
}

function onResults(results) {
    // 1. Draw Static Background
    canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height);
    if (bgImg.complete) {
        canvasCtx.drawImage(bgImg, 0, 0, canvasElement.width, canvasElement.height);
    }

    // 2. Isolate and Draw Player (Segmentation)
    if (results.segmentationMask && results.poseLandmarks) {
        offscreenCtx.globalCompositeOperation = 'source-over';
        offscreenCtx.clearRect(0, 0, offscreenCanvas.width, offscreenCanvas.height);
        
        offscreenCtx.save();
        // Mirror the canvas for the player drawing so it feels like a mirror
        offscreenCtx.translate(offscreenCanvas.width, 0);
        offscreenCtx.scale(-1, 1);
        
        // Draw Segmentation Mask
        offscreenCtx.drawImage(results.segmentationMask, 0, 0, offscreenCanvas.width, offscreenCanvas.height);
        
        // Use Source-In to only keep the video where the mask is solid
        offscreenCtx.globalCompositeOperation = 'source-in';
        offscreenCtx.drawImage(results.image, 0, 0, offscreenCanvas.width, offscreenCanvas.height);
        offscreenCtx.restore();

        // Draw the isolated player over the stadium background
        canvasCtx.globalAlpha = gameConfig.cameraOpacity;
        canvasCtx.drawImage(offscreenCanvas, 0, 0, canvasElement.width, canvasElement.height);
        canvasCtx.globalAlpha = 1.0;
        
        // Map Body Parts for Game Logic
        const w = canvasElement.width;
        const h = canvasElement.height;
        const landmarks = results.poseLandmarks;
        
        // X is reversed here to match the mirrored display
        const getCoords = (index) => ({
            x: (1 - landmarks[index].x) * w,
            y: landmarks[index].y * h
        });

        contactPoints = {
            left_wrist: getCoords(15), right_wrist: getCoords(16),
            left_elbow: getCoords(13), right_elbow: getCoords(14),
            left_shoulder: getCoords(11), right_shoulder: getCoords(12),
            head: getCoords(0), // Nose
            left_knee: getCoords(25), right_knee: getCoords(26),
            left_foot: getCoords(31), right_foot: getCoords(32) // Added feet!
        };
    }
    
    // 3. Process Physics and Draw Game Elements
    updateGame();
    drawGame();
}

const pose = new Pose({
    locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/pose/${file}`
});

pose.setOptions({
    modelComplexity: 1,
    smoothLandmarks: true,
    enableSegmentation: true, // Turns on background removal
    smoothSegmentation: true,
    minDetectionConfidence: 0.5,
    minTrackingConfidence: 0.5
});
pose.onResults(onResults);

const camera = new Camera(videoElement, {
    onFrame: async () => {
        await pose.send({image: videoElement});
    },
    width: 1280,
    height: 720
});
camera.start();

updateUI();
</script>
</body>
</html>
