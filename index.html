<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pro Goalkeeper Challenge</title>
    
    <!-- Pinned versions of MediaPipe to prevent CDN loading errors -->
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose@0.5.1675381251/pose.js" crossorigin="anonymous"></script>
    
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; overflow: hidden; }
        
        #game-container {
            position: relative; width: 100vw; height: 100vh;
            background-color: #111;
        }

        /* CRITICAL FIX: Video must be "visible" to the browser engine to play, but we hide it behind the canvas */
        #webcam {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 1; opacity: 0.01; pointer-events: none;
        }
        
        #gameCanvas {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 2;
        }

        .overlay {
            position: absolute; top: 0; left: 0; right: 0; bottom: 0;
            z-index: 20; color: white; display: flex; flex-direction: column;
            justify-content: center; align-items: center; text-align: center;
            background: rgba(0,0,0,0.85); backdrop-filter: blur(8px);
        }

        #hud {
            position: absolute; top: 20px; left: 0; right: 0; z-index: 10;
            display: flex; justify-content: space-around; pointer-events: none;
        }
        .hud-box {
            background: rgba(0, 0, 0, 0.7); padding: 10px 25px; border-radius: 8px;
            font-size: 1.8rem; font-weight: bold; color: white; border-bottom: 4px solid #fff;
        }
        #timer-box { border-color: #ff9800; }
        
        button {
            padding: 15px 40px; font-size: 1.5rem; font-weight: bold; color: white;
            background: #4caf50; border: none; border-radius: 8px; cursor: pointer;
            box-shadow: 0 4px 10px rgba(76, 175, 80, 0.4); transition: 0.2s;
        }
        button:hover { background: #45a049; transform: scale(1.05); }

        #debug-log { color: #ff5252; margin-top: 20px; font-weight: bold; font-family: monospace; font-size: 1.2rem;}
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div id="game-container">
        <!-- Native Video Element -->
        <video id="webcam" autoplay playsinline muted></video>
        <canvas id="gameCanvas"></canvas>

        <!-- HUD -->
        <div id="hud" class="hidden">
            <div class="hud-box">SCORE: <span id="ui-score" style="color:#4caf50;">0</span></div>
            <div id="timer-box" class="hud-box">TIME: <span id="ui-time">120</span></div>
            <div class="hud-box">STREAK: <span id="ui-streak" style="color:#ffeb3b;">0</span></div>
        </div>

        <!-- Start Screen -->
        <div id="screen-start" class="overlay">
            <h1 style="font-size: 4rem; margin:0;">GOALKEEPER PRO</h1>
            <p style="font-size: 1.5rem;">Block the balls with your body. You have 2 minutes.</p>
            <button id="btn-start" style="margin-top:20px;">Grant Camera & Play</button>
            <p id="debug-log"></p>
        </div>

        <!-- Loading Screen -->
        <div id="screen-loading" class="overlay hidden">
            <h2>Warming up AI...</h2>
            <p>Please stand back so the camera can see your whole body.</p>
        </div>

        <!-- Game Over Screen -->
        <div id="screen-gameover" class="overlay hidden">
            <h1 style="color: #f44336; font-size: 4rem; margin:0;">MATCH OVER</h1>
            <h2>Final Score: <span id="final-score">0</span></h2>
            <h2>Best Streak: <span id="final-streak">0</span></h2>
            <button id="btn-restart" style="margin-top:20px;">Play Again</button>
        </div>
    </div>

<script>
    const video = document.getElementById('webcam');
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const debugLog = document.getElementById('debug-log');
    
    // Screens & UI
    const screenStart = document.getElementById('screen-start');
    const screenLoading = document.getElementById('screen-loading');
    const screenGameOver = document.getElementById('screen-gameover');
    const hud = document.getElementById('hud');
    const uiScore = document.getElementById('ui-score');
    const uiTime = document.getElementById('ui-time');
    const uiStreak = document.getElementById('ui-streak');

    // Offscreen canvas for processing player cutout
    const offscreenCanvas = document.createElement('canvas');
    const offscreenCtx = offscreenCanvas.getContext('2d');

    // Images
    const bgImg = new Image();
    bgImg.src = 'soccerfifabg.png';

    const ballImg = new Image();
    ballImg.src = 'data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><circle cx="50" cy="50" r="48" fill="%23fff" stroke="%23000" stroke-width="4"/><path d="M50 20 L30 40 L40 70 L60 70 L70 40 Z" fill="%23111"/><line x1="50" y1="20" x2="50" y2="2" stroke="%23111" stroke-width="5"/><line x1="30" y1="40" x2="5" y2="30" stroke="%23111" stroke-width="5"/><line x1="70" y1="40" x2="95" y2="30" stroke="%23111" stroke-width="5"/><line x1="40" y1="70" x2="25" y2="95" stroke="%23111" stroke-width="5"/><line x1="60" y1="70" x2="75" y2="95" stroke="%23111" stroke-width="5"/></svg>';

    // Game State
    let state = {
        status: 'start', // start, loading, playing, gameover
        score: 0, streak: 0, bestStreak: 0, timeLeft: 120,
        playerCutout: null,
        contactPoints: [],
        timerInterval: null
    };

    let ball = { active: false };
    let poseAI = null;
    let lastVideoTime = -1;

    // Error Logger
    function logError(msg) {
        console.error(msg);
        debugLog.innerHTML += `<br>${msg}`;
    }

    // --- GAME PHYSICS & LOGIC ---
    function spawnBall() {
        if (state.status !== 'playing') return;
        
        ball = {
            active: true,
            phase: 'incoming', // incoming or deflected
            radius: 5, // Starts tiny in the distance
            x: (canvas.width / 2) + (Math.random() - 0.5) * 250, // Aim near center
            y: canvas.height * 0.40, // Spawn at the horizon line of the stadium
            speedX: (Math.random() - 0.5) * 8, 
            speedY: (4 + Math.random() * 3) * (state.timeLeft < 60 ? 1.5 : 1), // Faster in last minute
            growth: 0.15, // How fast it scales up
            rotation: 0
        };
    }

    function updateGame() {
        if (state.status !== 'playing') return;

        if (!ball.active) {
            ball.active = true;
            setTimeout(spawnBall, 1000);
            return;
        }

        if (ball.phase === 'incoming') {
            ball.x += ball.speedX;
            ball.y += ball.speedY;
            ball.radius += ball.growth * ball.speedY;
            ball.rotation += 0.1;

            // Collision Detection
            let hit = false;
            let hitX = 0;
            
            for (let i = 0; i < state.contactPoints.length; i++) {
                let pt = state.contactPoints[i];
                if (!pt) continue;
                let dist = Math.hypot(ball.x - pt.x, ball.y - pt.y);
                if (dist < ball.radius + 40) { // Hitbox buffer
                    hit = true;
                    hitX = pt.x;
                    break;
                }
            }

            if (hit) {
                // Ball Blocked! Bounce it away
                ball.phase = 'deflected';
                ball.speedY = -Math.abs(ball.speedY * 0.7); // Bounce UP and BACK
                ball.speedX = (ball.x - hitX) * 0.15; // Deflect left/right based on impact
                
                state.score += 10 + (state.streak * 2);
                state.streak++;
                if (state.streak > state.bestStreak) state.bestStreak = state.streak;
                uiScore.innerText = state.score;
                uiStreak.innerText = state.streak;
                
                document.getElementById('game-container').style.outline = "8px solid #4caf50";
                setTimeout(() => document.getElementById('game-container').style.outline = "none", 200);
            } 
            else if (ball.y > canvas.height + ball.radius) {
                // Missed goal
                state.streak = 0;
                uiStreak.innerText = state.streak;
                ball.active = false; // Trigger respawn
                
                document.getElementById('game-container').style.outline = "8px solid #f44336";
                setTimeout(() => document.getElementById('game-container').style.outline = "none", 200);
            }
        } 
        else if (ball.phase === 'deflected') {
            // Ball flying away towards the background
            ball.x += ball.speedX;
            ball.y += ball.speedY;
            ball.radius -= ball.growth * Math.abs(ball.speedY) * 1.5; // Shrink as it flies away
            ball.rotation -= 0.1;

            if (ball.radius < 2 || ball.y < 0 || ball.x < 0 || ball.x > canvas.width) {
                ball.active = false; // Trigger respawn
            }
        }
    }

    // --- DRAWING LOOP ---
    function draw() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        offscreenCanvas.width = canvas.width;
        offscreenCanvas.height = canvas.height;

        ctx.clearRect(0, 0, canvas.width, canvas.height);

        // 1. Draw Stadium Background
        if (bgImg.complete && bgImg.naturalHeight !== 0) {
            ctx.drawImage(bgImg, 0, 0, canvas.width, canvas.height);
        } else {
            ctx.fillStyle = "#222";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
        }

        // 2. Draw Mirrored Player
        if (state.playerCutout && state.status === 'playing') {
            ctx.save();
            ctx.translate(canvas.width, 0);
            ctx.scale(-1, 1);
            ctx.drawImage(state.playerCutout, 0, 0, canvas.width, canvas.height);
            ctx.restore();
        }

        // 3. Draw Ball
        if (ball.active && ball.radius > 0) {
            ctx.save();
            ctx.translate(ball.x, ball.y);
            ctx.rotate(ball.rotation);
            ctx.drawImage(ballImg, -ball.radius, -ball.radius, ball.radius * 2, ball.radius * 2);
            ctx.restore();
        }

        if (state.status === 'playing') {
            updateGame();
        }

        requestAnimationFrame(draw); // Loop forever
    }

    // --- AI PROCESSING ---
    function onPoseResults(results) {
        if (state.status === 'loading') {
            startGameplay();
        }

        // Create player cutout
        if (results.segmentationMask) {
            offscreenCtx.save();
            offscreenCtx.clearRect(0, 0, offscreenCanvas.width, offscreenCanvas.height);
            // Flip the mask processing so it matches the mirrored draw
            offscreenCtx.translate(offscreenCanvas.width, 0);
            offscreenCtx.scale(-1, 1);
            
            offscreenCtx.drawImage(results.segmentationMask, 0, 0, offscreenCanvas.width, offscreenCanvas.height);
            offscreenCtx.globalCompositeOperation = 'source-in';
            offscreenCtx.drawImage(results.image, 0, 0, offscreenCanvas.width, offscreenCanvas.height);
            offscreenCtx.restore();
            
            state.playerCutout = offscreenCanvas;
        }

        // Map Body parts for collision
        if (results.poseLandmarks) {
            const w = canvas.width;
            const h = canvas.height;
            state.contactPoints = [];
            
            // Mirror X coordinates for collision so right hand = right screen side
            const addPoint = (index) => {
                let lm = results.poseLandmarks[index];
                if (lm && lm.visibility > 0.5) {
                    state.contactPoints.push({ x: (1 - lm.x) * w, y: lm.y * h });
                }
            };

            // Head, shoulders, elbows, wrists, knees, ankles
            [0, 11, 12, 13, 14, 15, 16, 25, 26, 31, 32].forEach(addPoint);
        } else {
            state.contactPoints = [];
        }
    }

    async function processVideoFrame() {
        if (state.status === 'playing' || state.status === 'loading') {
            if (video.currentTime !== lastVideoTime) {
                lastVideoTime = video.currentTime;
                try {
                    await poseAI.send({ image: video });
                } catch (e) {
                    console.warn("AI Frame Skip");
                }
            }
        }
        requestAnimationFrame(processVideoFrame);
    }

    // --- FLOW CONTROL ---
    function startGameplay() {
        state.status = 'playing';
        screenLoading.style.display = 'none';
        document.getElementById('hud').style.display = 'flex';
        
        state.score = 0; state.streak = 0; state.timeLeft = 120;
        ui.score.innerText = "0"; ui.streak.innerText = "0"; ui.time.innerText = "120";
        
        ball.active = false;
        spawnBall();

        if (state.gameTimer) clearInterval(state.gameTimer);
        state.gameTimer = setInterval(() => {
            state.timeLeft--;
            ui.time.innerText = state.timeLeft;
            
            if (state.timeLeft <= 0) {
                clearInterval(state.gameTimer);
                state.status = 'over';
                document.getElementById('hud').style.display = 'none';
                screenGameOver.style.display = 'flex';
                ui.finalScore.innerText = state.score;
                ui.finalStreak.innerText = state.bestStreak;
            }
        }, 1000);
    }

    async function initSystem() {
        screenStart.style.display = 'none';
        screenLoading.style.display = 'flex';
        ui.startError.innerText = "";

        try {
            // 1. Request Camera Native
            const stream = await navigator.mediaDevices.getUserMedia({ 
                video: { width: 1280, height: 720, facingMode: "user" } 
            });
            video.srcObject = stream;
            
            // 2. Init AI
            poseAI = new Pose({ locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/pose@0.5.1675381251/${file}` });
            poseAI.setOptions({
                modelComplexity: 1, smoothLandmarks: true, 
                enableSegmentation: true, smoothSegmentation: true, 
                minDetectionConfidence: 0.5, minTrackingConfidence: 0.5
            });
            poseAI.onResults(onPoseResults);

            // 3. Wait for video to start playing, then begin AI loop
            video.onloadeddata = () => {
                video.play();
                state.gameStatus = 'loading';
                processVideoFrame();
            };

        } catch (err) {
            logError("Camera Error: " + err.message);
            screenStart.style.display = 'flex';
            screenLoading.style.display = 'none';
        }
    }

    // Event Listeners
    ui.startBtn.addEventListener('click', initSystem);
    ui.playAgainBtn.addEventListener('click', () => {
        screenGameOver.style.display = 'none';
        startGameplay();
    });

    // Start Visual Loop
    requestAnimationFrame(draw);

</script>
</body>
</html>
