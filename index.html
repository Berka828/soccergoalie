<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Advanced Webcam Goalkeeper Game</title>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose/pose.js" crossorigin="anonymous"></script>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: #111;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        #game-container {
            position: relative;
            width: 1280px; /* Increased width for a wider feel */
            height: 720px;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
            background: url('soccerfifabg.png') no-repeat center center; /* <-- NEW BACKGROUND IMAGE HERE */
            background-size: cover;
        }
        video, canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            transform: scaleX(-1);
        }
        video {
            object-fit: cover;
            opacity: 0.5; /* Default opacity */
        }
        canvas {
            z-index: 2;
        }
        #ui-overlay {
            position: absolute;
            top: 20px;
            left: 0;
            right: 0;
            display: flex;
            justify-content: space-around; /* Space out elements evenly */
            padding: 0 40px;
            z-index: 10;
            pointer-events: none;
        }
        .ui-box {
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(8px);
            padding: 12px 25px;
            border-radius: 10px;
            color: white;
            font-weight: bold;
            font-size: 1.5rem; /* Larger font */
            border-bottom: 4px solid rgba(255,255,255,0.2);
            text-shadow: 1px 1px 3px rgba(0,0,0,0.5);
        }
        #settings-panel {
            position: absolute;
            bottom: 20px;
            left: 20px;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(8px);
            padding: 15px;
            border-radius: 10px;
            z-index: 11;
            color: white;
        }
        .slider-container {
            margin-top: 10px;
            display: flex;
            flex-direction: column;
        }
        .slider-container label {
            font-size: 0.9rem;
            margin-bottom: 5px;
        }
    </style>
</head>
<body>

    <div id="game-container">
        <video id="webcam" autoplay playsinline></video>
        <canvas id="gameCanvas"></canvas>

        <div id="ui-overlay">
            <div id="score-box" class="ui-box">SCORE: <span id="score">0</span></div>
            <div id="streak-box" class="ui-box">STREAK: <span id="streak">0</span></div>
            <div id="goals-box" class="ui-box">GOALS: <span id="goals">0</span></div>
        </div>

        <div id="settings-panel">
            <strong>Settings</strong>
            <div class="slider-container">
                <label for="ballSpeed">Ball Speed</label>
                <input type="range" id="ballSpeed" min="1" max="10" value="5">
            </div>
            <div class="slider-container">
                <label for="cameraOpacity">Your Visibility</label>
                <input type="range" id="cameraOpacity" min="0" max="1" step="0.1" value="0.5">
            </div>
        </div>
    </div>

<script>
const videoElement = document.getElementById('webcam');
const canvasElement = document.getElementById('gameCanvas');
const canvasCtx = canvasElement.getContext('2d');

const scoreEl = document.getElementById('score');
const streakEl = document.getElementById('streak');
const goalsEl = document.getElementById('goals');
const ballSpeedSlider = document.getElementById('ballSpeed');
const cameraOpacitySlider = document.getElementById('cameraOpacity');

let score = 0;
let streak = 0;
let goals = 0;

let contactPoints = {};
const particles = [];
let gameConfig = {
    ballBaseSpeed: 5,
    cameraOpacity: 0.5
};
