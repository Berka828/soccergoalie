<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2-Minute Goalkeeper Challenge</title>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose/pose.js" crossorigin="anonymous"></script>
    <style>
        body {
            margin: 0; padding: 0; background: #000;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden; display: flex; justify-content: center;
            align-items: center; height: 100vh;
        }
        #game-container {
            position: relative; width: 1280px; height: 720px;
            border-radius: 12px; overflow: hidden;
            box-shadow: 0 20px 50px rgba(0,0,0,0.8);
            background-color: #000;
        }
        video { display: none; }
        canvas {
            position: absolute; top: 0; left: 0;
            width: 100%; height: 100%; z-index: 2;
        }
        #ui-overlay, #loading-screen, #game-over-screen {
            position: absolute; top: 0; left: 0; right: 0; bottom: 0;
            z-index: 10; color: white; display: flex;
        }
        #ui-overlay {
            justify-content: space-around; align-items: flex-start;
            padding-top: 20px; pointer-events: none;
        }
        .ui-box {
            background: rgba(0, 0, 0, 0.75); backdrop-filter: blur(8px);
            padding: 12px 30px; border-radius: 12px;
            font-weight: 800; font-size: 1.6rem;
            border-bottom: 4px solid rgba(255,255,255,0.2);
            text-shadow: 1px 1px 3px rgba(0,0,0,0.8);
        }
        #timer-box {
            font-size: 2rem; padding: 15px 40px;
            border-bottom-color: #ff9800; transition: border-color 0.5s ease;
        }
        #loading-screen, #game-over-screen {
            flex-direction: column; justify-content: center;
            align-items: center; text-align: center;
            background: rgba(0,0,0,0.85); backdrop-filter: blur(10px);
        }
        #game-over-screen { display: none; z-index: 100; }
        #loading-screen h2 { font-size: 3rem; }
        #game-over-screen h1 {
            font-size: 5rem; margin: 0; text-transform: uppercase;
            color: #f44336; text-shadow: 0 0 15px #f44336;
        }
        #game-over-screen p { font-size: 2rem; margin: 10px 0; }
        #play-again-btn {
            margin-top: 30px; padding: 20px 50px; font-size: 1.5rem;
            font-weight: bold; color: white; background: #4caf50;
            border: none; border-radius: 12px; cursor: pointer;
            text-transform: uppercase;
            box-shadow: 0 5px 15px rgba(76, 175, 80, 0.4);
            transition: all 0.2s ease;
        }
        #play-again-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(76, 175, 80, 0.6);
        }
    </style>
</head>
<body>
    <div id="game-container">
        <video id="webcam"></video>
        <canvas id="gameCanvas"></canvas>

        <div id="loading-screen">
            <h2>Loading Camera...</h2>
            <p>Please grant camera permissions when prompted.</p>
        </div>

        <div id="ui-overlay">
            <div class="ui-box">SCORE: <span id="score">0</span></div>
            <div id="timer-box" class="ui-box">TIME: <span id="time">120</span></div>
            <div class="ui-box">STREAK: <span id="streak">0</span></div>
        </div>

        <div id="game-over-screen">
            <h1>Game Over</h1>
            <p>Final Score: <span id="final-score">0</span></p>
            <p>Best Streak: <span id="final-streak">0</span></p>
            <button id="play-again-btn">Play Again</button>
        </div>
    </div>

    let ball = {};

    function gameLoop() {
        if (state.gameStatus === 'playing') updateGame();
        drawGame();
        requestAnimationFrame(gameLoop);
    }

    function initGame() {
        resizeCanvases();
        ui.playAgainBtn.addEventListener('click', startGame);

        const pose = new Pose({ locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/pose/${file}` });
        pose.setOptions({
            modelComplexity: 1, smoothLandmarks: true, enableSegmentation: true,
            smoothSegmentation: true, minDetectionConfidence: 0.5, minTrackingConfidence: 0.5
        });
        pose.onResults(onResults);

        const camera = new Camera(videoElement, {
            onFrame: async () => await pose.send({ image: videoElement }),
            width: 1280, height: 720
        });
        camera.start();

        startGame();
        gameLoop();
    }

    function startGame() {
        state = { ...state, gameStatus: 'playing', score: 0, streak: 0, bestStreak: 0, timeLeft: 120 };
        ball.active = false;
        ui.gameOver.style.display = 'none';
        ui.time.innerText = state.timeLeft;
        ui.timerBox.style.borderColor = '#ff9800';
        updateUI();

        if (state.gameTimer) clearInterval(state.gameTimer);
        state.gameTimer = setInterval(() => {
            state.timeLeft--;
            ui.time.innerText = state.timeLeft;
            if (state.timeLeft < 60 && state.timeLeft > 10) ui.timerBox.style.borderColor = '#fdd835';
            else if (state.timeLeft <= 10) ui.timerBox.style.borderColor = '#e53935';
            if (state.timeLeft <= 0) endGame();
        }, 1000);

        setTimeout(spawnBall, 1000);
    }

    function endGame() {
        clearInterval(state.gameTimer);
        state.gameStatus = 'over';
        ball.active = false;
        ui.finalScore.innerText = state.score;
        ui.finalStreak.innerText = state.bestStreak;
        ui.gameOver.style.display = 'flex';
    }

    function spawnBall() {
        if (state.gameStatus !== 'playing') return;
        ball = {
            active: true, state: 'incoming', radius: 5,
            x: canvasElement.width / 2 + (Math.random() - 0.5) * 300,
            y: canvasElement.height * 0.65,
            speedX: (Math.random() - 0.5) * 10,
            speedY: (4.5 + Math.random() * 2) * (state.timeLeft < 60 ? 1.5 : 1),
            sizeGrowth: 0.12, rotation: 0
        };
    }

    function updateGame() {
        if (!ball.active && state.gameStatus === 'playing') {
            setTimeout(spawnBall, 1500);
            ball.active = 'spawning';
        }
        if (ball.active !== true) return;

        if (ball.state === 'incoming') {
            ball.x += ball.speedX;
            ball.y += ball.speedY;
            ball.radius += ball.sizeGrowth * ball.speedY;
            ball.rotation += ball.speedY * 0.05;

            let saved = false;
            for (const part in state.contactPoints) {
                const point = state.contactPoints[part];
                if (point?.x && Math.hypot(ball.x - point.x, ball.y - point.y) < ball.radius + 40) {
                    saved = true;
                    // Deflection Physics
                    ball.state = 'deflected';
                    ball.speedY *= -0.6; // Reverse Y direction and lose some energy
                    ball.speedX += (ball.x - point.x) * 0.2; // Nudge based on contact point
                    break;
                }
            }

            if (saved) {
                state.score += 10 + (state.streak * 2);
                state.streak++;
                if (state.streak > state.bestStreak) state.bestStreak = state.streak;
            } else if (ball.y > canvasElement.height + ball.radius) {
                state.streak = 0;
                triggerFx("#f44336");
                ball.active = false;
            }
        } else if (ball.state === 'deflected') {
            ball.x += ball.speedX;
            ball.y += ball.speedY;
            ball.radius -= ball.sizeGrowth * Math.abs(ball.speedY) * 2; // Shrink faster
            if (ball.radius < 1 || ball.y < 0) ball.active = false;
        }
        updateUI();
    }

    function drawGame() {
        canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height);
        if (bgImg.complete) canvasCtx.drawImage(bgImg, 0, 0, canvasElement.width, canvasElement.height);
        
        // Draw the mirrored player cutout
        if (state.playerCutout) {
            canvasCtx.save();
            canvasCtx.scale(-1, 1);
            canvasCtx.translate(-canvasElement.width, 0);
            canvasCtx.drawImage(state.playerCutout, 0, 0, canvasElement.width, canvasElement.height);
            canvasCtx.restore();
        }
        
        if (ball.active === true) {
            canvasCtx.save();
            canvasCtx.translate(ball.x, ball.y);
            canvasCtx.rotate(ball.rotation);
            canvasCtx.drawImage(ballImg, -ball.radius, -ball.radius, ball.radius * 2, ball.radius * 2);
            canvasCtx.restore();
        }
    }

    function onResults(results) {
        if (state.gameStatus === 'loading') {
            ui.loading.style.display = 'none';
        }
        
        const w = canvasElement.width, h = canvasElement.height;
        offscreenCanvas.width = w; offscreenCanvas.height = h;
        offscreenCtx.clearRect(0, 0, w, h);
        
        if (results.segmentationMask) {
            offscreenCtx.drawImage(results.segmentationMask, 0, 0, w, h);
            offscreenCtx.globalCompositeOperation = 'source-in';
        }
        offscreenCtx.drawImage(results.image, 0, 0, w, h);
        state.playerCutout = offscreenCanvas;

        if (results.poseLandmarks) {
            // We DON'T invert the X-coordinate here.
            // The drawing is now handled correctly by flipping the whole canvas,
            // so the collision logic should use the original, un-mirrored coordinates.
            const getCoords = (index) => ({ x: results.poseLandmarks[index].x * w, y: results.poseLandmarks[index].y * h });
            state.contactPoints = {
                left_wrist: getCoords(15), right_wrist: getCoords(16),
                left_elbow: getCoords(13), right_elbow: getCoords(14),
                left_shoulder: getCoords(11), right_shoulder: getCoords(12),
                head: getCoords(0), left_knee: getCoords(25), right_knee: getCoords(26)
            };
        }
    }

    function triggerFx(color) {
        document.getElementById('game-container').style.outline = `8px solid ${color}`;
        setTimeout(() => document.getElementById('game-container').style.outline = 'none', 200);
    }
    
    function updateUI() {
        ui.score.innerText = state.score;
        ui.streak.innerText = state.streak;
    }

    function resizeCanvases() {
        canvasElement.width = 1280; canvasElement.height = 720;
    }

    // --- Initialization ---
    (() => {
        resizeCanvases();
        initGame();
    })();
</script>
</body>
</html>
