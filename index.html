<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Advanced Webcam Goalkeeper Game</title>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose/pose.js" crossorigin="anonymous"></script>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: #111;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        #game-container {
            position: relative;
            width: 1280px; /* Increased width for a wider feel */
            height: 720px;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
            background: url('soccerfifabg.png') no-repeat center center; /* <-- NEW BACKGROUND IMAGE HERE */
            background-size: cover;
        }
        video, canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            transform: scaleX(-1);
        }
        video {
            object-fit: cover;
            opacity: 0.5; /* Default opacity */
        }
        canvas {
            z-index: 2;
        }
        #ui-overlay {
            position: absolute;
            top: 20px;
            left: 0;
            right: 0;
            display: flex;
            justify-content: space-around; /* Space out elements evenly */
            padding: 0 40px;
            z-index: 10;
            pointer-events: none;
        }
        .ui-box {
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(8px);
            padding: 12px 25px;
            border-radius: 10px;
            color: white;
            font-weight: bold;
            font-size: 1.5rem; /* Larger font */
            border-bottom: 4px solid rgba(255,255,255,0.2);
            text-shadow: 1px 1px 3px rgba(0,0,0,0.5);
        }
        #settings-panel {
            position: absolute;
            bottom: 20px;
            left: 20px;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(8px);
            padding: 15px;
            border-radius: 10px;
            z-index: 11;
            color: white;
        }
        .slider-container {
            margin-top: 10px;
            display: flex;
            flex-direction: column;
        }
        .slider-container label {
            font-size: 0.9rem;
            margin-bottom: 5px;
        }
    </style>
</head>
<body>

    <div id="game-container">
        <video id="webcam" autoplay playsinline></video>
        <canvas id="gameCanvas"></canvas>

        <div id="ui-overlay">
            <div id="score-box" class="ui-box">SCORE: <span id="score">0</span></div>
            <div id="streak-box" class="ui-box">STREAK: <span id="streak">0</span></div>
            <div id="goals-box" class="ui-box">GOALS: <span id="goals">0</span></div>
        </div>

        <div id="settings-panel">
            <strong>Settings</strong>
            <div class="slider-container">
                <label for="ballSpeed">Ball Speed</label>
                <input type="range" id="ballSpeed" min="1" max="10" value="5">
            </div>
            <div class="slider-container">
                <label for="cameraOpacity">Your Visibility</label>
                <input type="range" id="cameraOpacity" min="0" max="1" step="0.1" value="0.5">
            </div>
        </div>
    </div>

// Game state variables
let ball = { x: 0, y: 0, radius: 15, speedX: 0, speedY: 4, sizeGrowth: 0.1, active: false };

function resizeCanvas() {
    canvasElement.width = 1280;
    canvasElement.height = 720;
}
resizeCanvas();

cameraOpacitySlider.addEventListener('input', (e) => {
    gameConfig.cameraOpacity = parseFloat(e.target.value);
    videoElement.style.opacity = gameConfig.cameraOpacity;
});

ballSpeedSlider.addEventListener('input', (e) => {
    gameConfig.ballBaseSpeed = parseFloat(e.target.value);
});


function spawnBall() {
    ball.x = canvasElement.width / 2;
    ball.y = canvasElement.height * 0.4;
    ball.radius = 10;
    ball.speedX = (Math.random() - 0.5) * 12;
    ball.speedY = gameConfig.ballBaseSpeed + Math.random() * 3;
    ball.sizeGrowth = 0.08;
    ball.active = true;
}

function updateGame() {
    if (!ball.active) {
        setTimeout(spawnBall, 1500); // Longer delay between shots
        ball.active = 'spawning'; // Use a state to prevent multiple spawns
    }

    if (ball.active === true) {
        ball.x += ball.speedX;
        ball.y += ball.speedY;
        ball.radius += ball.sizeGrowth * ball.speedY;

        let saved = false;
        // Full Body Collision Detection
        for (const part in contactPoints) {
            if (contactPoints[part].x) {
                let dist = Math.hypot(ball.x - contactPoints[part].x, ball.y - contactPoints[part].y);
                if (dist < ball.radius + 35) { // 35px buffer for better playability
                    saved = true;
                    triggerFx("#4caf50", contactPoints[part].x, contactPoints[part].y);
                    break;
                }
            }
        }

        if (saved) {
            score += 10 + streak; // Bonus points for streaks
            streak++;
            updateUI();
            ball.active = false;
        } else if (ball.y > canvasElement.height + ball.radius) {
            goals++;
            streak = 0;
            triggerFx("#f44336");
            updateUI();
            ball.active = false;
        }
    }
     // Update and draw particles
    for (let i = particles.length - 1; i >= 0; i--) {
        const p = particles[i];
        p.x += p.vx;
        p.y += p.vy;
        p.alpha -= 0.04;
        if (p.alpha <= 0) {
            particles.splice(i, 1);
        }
    }
}

function drawGame() {
    canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height);

    if (ball.active === true) {
        canvasCtx.drawImage(ballImg, ball.x - ball.radius, ball.y - ball.radius, ball.radius * 2, ball.radius * 2);
    }
    
    // Draw particles
    particles.forEach(p => {
        canvasCtx.save();
        canvasCtx.globalAlpha = p.alpha;
        canvasCtx.fillStyle = p.color;
        canvasCtx.beginPath();
        canvasCtx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
        canvasCtx.fill();
        canvasCtx.restore();
    });
}

function updateUI() {
    scoreEl.innerText = score;
    streakEl.innerText = streak;
    goalsEl.innerText = goals;
}

// Visual impact splash on hit/miss
function triggerFx(color, x, y) {
    if (x && y) { // Create a particle burst at the contact point
        for (let i = 0; i < 20; i++) {
            particles.push({
                x: x,
                y: y,
                vx: (Math.random() - 0.5) * 8,
                vy: (Math.random() - 0.5) * 8,
                size: Math.random() * 5 + 2,
                color: color,
                alpha: 1
            });
        }
    } else { // Goal scored, flash the border
        gameContainer.style.outline = `8px solid ${color}`;
        setTimeout(() => gameContainer.style.outline = 'none', 200);
    }
}

function onResults(results) {
    if (results.poseLandmarks) {
        // Map all relevant body parts
        const w = canvasElement.width;
        const h = canvasElement.height;
        const landmarks = results.poseLandmarks;
        
        // Helper to get coordinates
        const getCoords = (index) => ({
            x: (1 - landmarks[index].x) * w,
            y: landmarks[index].y * h
        });

        contactPoints = {
            left_wrist: getCoords(15),
            right_wrist: getCoords(16),
            left_elbow: getCoords(13),
            right_elbow: getCoords(14),
            left_shoulder: getCoords(11),
            right_shoulder: getCoords(12),
            nose: getCoords(0), // Head
            left_knee: getCoords(25),
            right_knee: getCoords(26),
        };
    }
    
    // Main game loop
    drawGame();
    updateGame();
}

const pose = new Pose({
    locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/pose/${file}`
});

pose.setOptions({
    modelComplexity: 1,
    smoothLandmarks: true,
    minDetectionConfidence: 0.5,
    minTrackingConfidence: 0.5
});

pose.onResults(onResults);

const camera = new Camera(videoElement, {
    onFrame: async () => {
        await pose.send({image: videoElement});
    },
    width: 1280,
    height: 720
});
camera.start();

updateUI(); // Initialize UI
</script>
</body>
</html>
