<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Goalkeeper Challenge - Camera Fixed</title>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose/pose.js" crossorigin="anonymous"></script>
  <style>
    body { margin:0; padding:0; background:#111; font-family:Segoe UI,Tahoma,sans-serif; overflow:hidden; display:flex; justify-content:center; align-items:center; height:100vh; }
    #game-container { position:relative; width:1280px; height:720px; border-radius:12px; overflow:hidden; box-shadow:0 20px 50px rgba(0,0,0,.8); background:#000; }
    #webcam { position:absolute; inset:0; width:100%; height:100%; object-fit:cover; transform:scaleX(-1); z-index:1; }
    #gameCanvas { position:absolute; inset:0; width:100%; height:100%; z-index:2; }
    .overlay-screen { position:absolute; inset:0; z-index:20; color:white; display:flex; flex-direction:column; justify-content:center; align-items:center; text-align:center; background:rgba(0,0,0,.86); backdrop-filter:blur(8px); padding:30px; }
    #ui-overlay { position:absolute; top:0; left:0; right:0; z-index:10; display:flex; justify-content:space-around; padding-top:20px; pointer-events:none; }
    .ui-box { background:rgba(0,0,0,.75); padding:12px 30px; border-radius:12px; font-weight:800; font-size:1.6rem; color:white; border-bottom:4px solid rgba(255,255,255,.2); }
    #timer-box { font-size:2rem; padding:15px 40px; border-bottom-color:#ff9800; }
    .action-btn { margin-top:30px; padding:20px 50px; font-size:1.5rem; font-weight:bold; color:white; background:#4caf50; border:0; border-radius:12px; cursor:pointer; text-transform:uppercase; box-shadow:0 5px 15px rgba(76,175,80,.4); }
    .action-btn:hover { transform:translateY(-3px); }
    .error-msg { color:#ff6b6b; margin-top:20px; font-weight:bold; font-size:1.05rem; max-width:850px; line-height:1.4; }
    #loading-screen, #game-over-screen { display:none; }
    #game-over-screen h1 { font-size:5rem; margin:0; color:#f44336; }
    #game-over-screen p { font-size:2rem; margin:10px 0; }
  </style>
</head>
<body>
  <div id="game-container">
    <video id="webcam" autoplay playsinline muted></video>
    <canvas id="gameCanvas"></canvas>

    <div id="ui-overlay">
      <div class="ui-box">SCORE: <span id="score">0</span></div>
      <div id="timer-box" class="ui-box">TIME: <span id="time">120</span></div>
      <div class="ui-box">STREAK: <span id="streak">0</span></div>
    </div>

    <div id="start-screen" class="overlay-screen">
      <h1 style="font-size:3rem;margin-bottom:10px;">GOALKEEPER CHALLENGE</h1>
      <p style="font-size:1.5rem;">Defend the goal with your body for 2 minutes!</p>
      <button id="start-btn" class="action-btn">Grant Camera & Play</button>
      <div id="start-error" class="error-msg"></div>
    </div>

    <div id="loading-screen" class="overlay-screen">
      <h2>Warming up AI...</h2>
      <p>Please stand back so the camera can see you.</p>
      <div id="loading-error" class="error-msg"></div>
    </div>

    <div id="game-over-screen" class="overlay-screen">
      <h1>Game Over</h1>
      <p>Final Score: <span id="final-score">0</span></p>
      <p>Best Streak: <span id="final-streak">0</span></p>
      <button id="play-again-btn" class="action-btn">Play Again</button>
    </div>
  </div>

<script>
const video = document.getElementById('webcam');
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

const ui = {
  score: document.getElementById('score'), streak: document.getElementById('streak'), time: document.getElementById('time'),
  startScreen: document.getElementById('start-screen'), loadingScreen: document.getElementById('loading-screen'), gameOver: document.getElementById('game-over-screen'),
  finalScore: document.getElementById('final-score'), finalStreak: document.getElementById('final-streak'),
  startBtn: document.getElementById('start-btn'), playAgainBtn: document.getElementById('play-again-btn'),
  startError: document.getElementById('start-error'), loadingError: document.getElementById('loading-error')
};

let pose, stream, animationId, timerId;
let latestLandmarks = null;
let status = 'idle';
let score = 0, streak = 0, bestStreak = 0, timeLeft = 120;
let ball = { x: 1100, y: 360, r: 26, vx: -8, vy: 0, active: false };
let lastPoseSend = 0;

function resizeCanvas() {
  canvas.width = 1280;
  canvas.height = 720;
}
resizeCanvas();

function showOnly(screen) {
  ui.startScreen.style.display = screen === 'start' ? 'flex' : 'none';
  ui.loadingScreen.style.display = screen === 'loading' ? 'flex' : 'none';
  ui.gameOver.style.display = screen === 'over' ? 'flex' : 'none';
}

function cameraErrorMessage(err) {
  const base = err && err.name ? err.name : 'Camera error';
  if (location.protocol !== 'https:' && location.hostname !== 'localhost' && location.hostname !== '127.0.0.1') {
    return `${base}: Camera access requires HTTPS. Publish with GitHub Pages using https://, not a local/file link.`;
  }
  if (base === 'NotAllowedError' || base === 'PermissionDeniedError') return 'Camera permission was blocked. Click the lock/camera icon in Chrome address bar, allow Camera, then refresh.';
  if (base === 'NotFoundError' || base === 'DevicesNotFoundError') return 'No camera was found. Make sure the webcam/OBS Virtual Camera is connected and available.';
  if (base === 'NotReadableError' || base === 'TrackStartError') return 'The camera is already being used by another app. Close Zoom/OBS/Teams/other browser tabs, then refresh.';
  return `${base}: ${err.message || 'Unable to start camera.'}`;
}

async function startCamera() {
  if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) throw new Error('getUserMedia is not supported in this browser. Use Chrome or Edge.');
  stream = await navigator.mediaDevices.getUserMedia({
    video: { width: { ideal: 1280 }, height: { ideal: 720 }, facingMode: 'user' },
    audio: false
  });
  video.srcObject = stream;
  await video.play();
  await new Promise(resolve => {
    if (video.readyState >= 2) resolve();
    else video.onloadedmetadata = resolve;
  });
}

async function setupPose() {
  pose = new Pose({ locateFile: file => `https://cdn.jsdelivr.net/npm/@mediapipe/pose/${file}` });
  pose.setOptions({ modelComplexity: 1, smoothLandmarks: true, enableSegmentation: false, minDetectionConfidence: 0.5, minTrackingConfidence: 0.5 });
  pose.onResults(results => { latestLandmarks = results.poseLandmarks || null; });
}

async function startGame() {
  ui.startError.textContent = '';
  ui.loadingError.textContent = '';
  showOnly('loading');
  status = 'loading';
  try {
    await startCamera();
    await setupPose();
    resetGame();
    showOnly(null);
    status = 'playing';
    gameLoop();
    timerId = setInterval(tickTimer, 1000);
  } catch (err) {
    console.error(err);
    status = 'idle';
    showOnly('start');
    ui.startError.textContent = cameraErrorMessage(err);
  }
}

function resetGame() {
  score = 0; streak = 0; bestStreak = 0; timeLeft = 120;
  ui.score.textContent = score; ui.streak.textContent = streak; ui.time.textContent = timeLeft;
  spawnBall();
}

function tickTimer() {
  if (status !== 'playing') return;
  timeLeft--;
  ui.time.textContent = timeLeft;
  if (timeLeft <= 0) endGame();
}

function spawnBall() {
  const side = Math.random() < 0.5 ? 'left' : 'right';
  ball.r = 24 + Math.random() * 10;
  ball.x = side === 'left' ? -40 : 1320;
  ball.y = 150 + Math.random() * 420;
  ball.vx = side === 'left' ? 6 + Math.random() * 4 : -6 - Math.random() * 4;
  ball.vy = (Math.random() - 0.5) * 3;
  ball.active = true;
}

function getBodyPoints() {
  if (!latestLandmarks) return [];
  return latestLandmarks
    .filter(p => p.visibility === undefined || p.visibility > 0.45)
    .map(p => ({ x: (1 - p.x) * canvas.width, y: p.y * canvas.height }));
}

function checkCollision(points) {
  for (const p of points) {
    const d = Math.hypot(p.x - ball.x, p.y - ball.y);
    if (d < ball.r + 42) return true;
  }
  return false;
}

function updateGame() {
  ball.x += ball.vx;
  ball.y += ball.vy;
  if (ball.y < 70 || ball.y > 650) ball.vy *= -1;
  const points = getBodyPoints();
  if (checkCollision(points)) {
    score += 10; streak += 1; bestStreak = Math.max(bestStreak, streak);
    ui.score.textContent = score; ui.streak.textContent = streak;
    spawnBall();
  }
  if (ball.x < -80 || ball.x > 1360) {
    streak = 0; ui.streak.textContent = streak;
    spawnBall();
  }
}

function drawBackground() {
  ctx.fillStyle = '#0b5f35'; ctx.fillRect(0,0,canvas.width,canvas.height);
  ctx.fillStyle = 'rgba(255,255,255,.15)';
  ctx.fillRect(70,120,1140,480); ctx.strokeStyle = 'rgba(255,255,255,.8)'; ctx.lineWidth = 8; ctx.strokeRect(70,120,1140,480);
  ctx.fillStyle = 'rgba(0,0,0,.35)'; ctx.fillRect(0,0,canvas.width,canvas.height);
}

function drawPose(points) {
  ctx.fillStyle = 'rgba(0, 210, 255, .9)';
  points.forEach(p => { ctx.beginPath(); ctx.arc(p.x, p.y, 10, 0, Math.PI*2); ctx.fill(); });
}

function drawBall() {
  ctx.beginPath(); ctx.arc(ball.x, ball.y, ball.r, 0, Math.PI * 2); ctx.fillStyle = '#fff'; ctx.fill();
  ctx.lineWidth = 3; ctx.strokeStyle = '#111'; ctx.stroke();
  ctx.fillStyle = '#111'; ctx.font = `${ball.r}px Arial`; ctx.textAlign = 'center'; ctx.textBaseline = 'middle'; ctx.fillText('⚽', ball.x, ball.y + 1);
}

async function gameLoop(now = 0) {
  if (status !== 'playing') return;
  animationId = requestAnimationFrame(gameLoop);
  if (pose && video.readyState >= 2 && now - lastPoseSend > 33) {
    lastPoseSend = now;
    try { await pose.send({ image: video }); } catch (err) { console.warn('Pose frame skipped', err); }
  }
  updateGame();
  drawBackground();
  drawPose(getBodyPoints());
  drawBall();
}

function endGame() {
  status = 'over';
  clearInterval(timerId);
  cancelAnimationFrame(animationId);
  ui.finalScore.textContent = score;
  ui.finalStreak.textContent = bestStreak;
  showOnly('over');
}

function restartGame() {
  showOnly(null);
  resetGame();
  status = 'playing';
  gameLoop();
  clearInterval(timerId);
  timerId = setInterval(tickTimer, 1000);
}

ui.startBtn.addEventListener('click', startGame);
ui.playAgainBtn.addEventListener('click', restartGame);
</script>
</body>
</html>
