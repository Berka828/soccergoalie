<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pro Goalkeeper Challenge</title>
    <!-- Load MediaPipe AI Models -->
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose/pose.js" crossorigin="anonymous"></script>
    
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #111; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; overflow: hidden; }
        
        #game-container {
            position: relative; width: 100vw; height: 100vh;
            background-color: #333;
            background-image: url('soccerfifabg.png'); /* YOUR BACKGROUND IMAGE */
            background-size: cover; background-position: center;
        }

        /* The actual webcam feed is hidden, we only use it for data */
        #webcam { display: none; }
        
        /* The canvas where we draw the game */
        #gameCanvas {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 2;
        }

        /* UI Overlays */
        .overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            background: rgba(0,0,0,0.85); z-index: 20; color: white; text-align: center;
        }
        #hud {
            position: absolute; top: 20px; left: 0; width: 100%; z-index: 10;
            display: flex; justify-content: space-around; pointer-events: none;
        }
        .hud-box {
            background: rgba(0, 0, 0, 0.7); padding: 10px 25px; border-radius: 8px;
            font-size: 1.8rem; font-weight: bold; color: white; border-bottom: 4px solid #fff;
        }
        #timer-box { border-color: #ff9800; }
        
        button {
            padding: 15px 40px; font-size: 1.5rem; font-weight: bold; color: white;
            background: #4caf50; border: none; border-radius: 8px; cursor: pointer;
            box-shadow: 0 4px 10px rgba(76, 175, 80, 0.4); transition: 0.2s;
        }
        button:hover { background: #45a049; transform: scale(1.05); }

        #debug-log { color: #ff5252; margin-top: 20px; font-weight: bold; max-width: 80%; font-family: monospace; white-space: pre-wrap;}
        
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div id="game-container">
        <!-- Native Video Element -->
        <video id="webcam" autoplay playsinline muted></video>
        <canvas id="gameCanvas"></canvas>

        <!-- Heads Up Display -->
        <div id="hud" class="hidden">
            <div class="hud-box">SCORE: <span id="ui-score" style="color:#4caf50;">0</span></div>
            <div id="timer-box" class="hud-box">TIME: <span id="ui-time">120</span></div>
            <div class="hud-box">MISSED: <span id="ui-missed" style="color:#f44336;">0</span></div>
        </div>

        <!-- Start Screen -->
        <div id="screen-start" class="overlay">
            <h1 style="font-size: 4rem; margin:0;">GOALKEEPER</h1>
            <p style="font-size: 1.5rem;">Block the balls with your body. You have 2 minutes.</p>
            <button id="btn-start">Grant Camera & Play</button>
            <p id="debug-log"></p>
        </div>

        <!-- Loading Screen -->
        <div id="screen-loading" class="overlay hidden">
            <h2>Warming up AI...</h2>
            <p>Please stand back so the camera can see your whole body.</p>
        </div>

        <!-- Game Over Screen -->
        <div id="screen-gameover" class="overlay hidden">
            <h1 style="color: #f44336; font-size: 4rem; margin:0;">MATCH OVER</h1>
            <h2>Final Score: <span id="final-score">0</span></h2>
            <h2>Goals Missed: <span id="final-missed">0</span></h2>
            <button id="btn-restart" style="margin-top:20px;">Play Again</button>
        </div>
    </div>

<script>
    // --- System Variables ---
    const video = document.getElementById('webcam');
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const debugLog = document.getElementById('debug-log');
    
    // Screens
    const screenStart = document.getElementById('screen-start');
    const screenLoading = document.getElementById('screen-loading');
    const screenGameOver = document.getElementById('screen-gameover');
    const hud = document.getElementById('hud');

    // UI Elements
    const uiScore = document.getElementById('ui-score');
    const uiTime = document.getElementById('ui-time');
    const uiMissed = document.getElementById('ui-missed');

    // Offscreen canvas for AI player masking
    const maskCanvas = document.createElement('canvas');
    const maskCtx = maskCanvas.getContext('2d');

    // Generate Soccer Ball Image
    const ballImg = new Image();
    ballImg.src = 'data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><circle cx="50" cy="50" r="48" fill="%23fff" stroke="%23000" stroke-width="4"/><path d="M50 20 L30 40 L40 70 L60 70 L70 40 Z" fill="%23111"/><line x1="50" y1="20" x2="50" y2="2" stroke="%23111" stroke-width="5"/><line x1="30" y1="40" x2="5" y2="30" stroke="%23111" stroke-width="5"/><line x1="70" y1="40" x2="95" y2="30" stroke="%23111" stroke-width="5"/><line x1="40" y1="70" x2="25" y2="95" stroke="%23111" stroke-width="5"/><line x1="60" y1="70" x2="75" y2="95" stroke="%23111" stroke-width="5"/></svg>';

    // --- Game State ---
    let state = {
        status: 'start', // start, loading, playing, gameover
        score: 0,
        missed: 0,
        timeLeft: 120,
        timerInterval: null,
        playerCutout: null,
        contactPoints: [] 
    };

    let ball = {
        active: false, phase: 'none', 
        x: 0, y: 0, radius: 5,
        speedX: 0, speedY: 0,
        growth: 0, rotation: 0
    };

    let poseAI = null;

    // --- Logger ---
    function logError(msg) {
        console.error(msg);
        debugLog.innerHTML += `<br>ERROR: ${msg}`;
    }

    // --- Core Game Logic ---
    function spawnBall() {
        if (state.status !== 'playing') return;
        ball.active = true;
        ball.phase = 'incoming';
        ball.radius = 5; 
        
        ball.x = (canvas.width / 2) + (Math.random() - 0.5) * 200;
        ball.y = canvas.height * 0.45; 
        
        ball.speedX = (Math.random() - 0.5) * 8; 
        let speedMult = state.timeLeft < 60 ? 1.5 : 1.0; 
        ball.speedY = (4 + Math.random() * 3) * speedMult; 
        ball.growth = 0.15; 
        ball.rotation = 0;
    }

    function updatePhysics() {
        if (state.status !== 'playing') return;

        if (!ball.active) {
            ball.active = true;
            setTimeout(spawnBall, 1000);
            return;
        }

        if (ball.phase === 'incoming') {
            ball.x += ball.speedX;
            ball.y += ball.speedY;
            ball.radius += ball.growth * ball.speedY;
            ball.rotation += 0.1;

            let hit = false;
            let hitX = 0;
            
            for (let i = 0; i < state.contactPoints.length; i++) {
                let pt = state.contactPoints[i];
                if (!pt) continue;
                let dist = Math.hypot(ball.x - pt.x, ball.y - pt.y);
                if (dist < ball.radius + 40) { 
                    hit = true;
                    hitX = pt.x;
                    break;
                }
            }

            if (hit) {
                // DEFLECT PHYSICS! Bounce it away
                ball.phase = 'bouncing';
                ball.speedY = -(ball.speedY * 0.7); 
                ball.speedX = (ball.x - hitX) * 0.15; 
                state.score += 10;
                uiScore.innerText = state.score;
            } 
            else if (ball.y > canvas.height + ball.radius) {
                state.missed += 1;
                uiMissed.innerText = state.missed;
                ball.active = false; 
            }

        } else if (ball.phase === 'bouncing') {
            ball.x += ball.speedX;
            ball.y += ball.speedY;
            ball.radius -= ball.growth * Math.abs(ball.speedY); 
            ball.rotation -= 0.1;

            if (ball.radius < 2 || ball.y < 0 || ball.x < 0 || ball.x > canvas.width) {
                ball.active = false; 
            }
        }
    }

    // --- Drawing Loop ---
    function draw() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        maskCanvas.width = canvas.width;
        maskCanvas.height = canvas.height;

        ctx.clearRect(0, 0, canvas.width, canvas.height);

        if (state.playerCutout && state.status === 'playing') {
            ctx.save();
            ctx.translate(canvas.width, 0);
            ctx.scale(-1, 1);
            ctx.drawImage(state.playerCutout, 0, 0, canvas.width, canvas.height);
            ctx.restore();
        }

        if (ball.active && ball.phase !== 'none') {
            ctx.save();
            ctx.translate(ball.x, ball.y);
            ctx.rotate(ball.rotation);
            ctx.drawImage(ballImg, -ball.radius, -ball.radius, ball.radius * 2, ball.radius * 2);
            ctx.restore();
        }

        if (state.status === 'playing') {
            updatePhysics();
        }

        requestAnimationFrame(draw);
    }

    // --- MediaPipe AI Processing ---
    function onPoseResults(results) {
        if (state.status === 'loading') {
            state.status = 'playing';
            screenLoading.classList.add('hidden');
            hud.classList.remove('hidden');
            startTimer();
            spawnBall();
        }

        if (results.segmentationMask) {
            maskCtx.save();
            maskCtx.clearRect(0, 0, maskCanvas.width, maskCanvas.height);
            maskCtx.drawImage(results.segmentationMask, 0, 0, maskCanvas.width, maskCanvas.height);
            maskCtx.globalCompositeOperation = 'source-in';
            maskCtx.drawImage(results.image, 0, 0, maskCanvas.width, maskCanvas.height);
            maskCtx.restore();
            state.playerCutout = maskCanvas;
        }

        if (results.poseLandmarks) {
            const w = canvas.width;
            const h = canvas.height;
            state.contactPoints = [];
            
            const addPoint = (index) => {
                let lm = results.poseLandmarks[index];
                if (lm && lm.visibility > 0.5) {
                    // Coordinates inverted to match visual mirror
                    state.contactPoints.push({ x: (1 - lm.x) * w, y: lm.y * h });
                }
            };
            [0, 11, 12, 13, 14, 15, 16, 23, 24, 25, 26, 31, 32].forEach(addPoint);
        }
    }

    // --- Native Camera Loop ---
    async function startCameraLoop() {
        return new Promise((resolve) => {
            video.addEventListener('loadeddata', () => {
                const tick = async () => {
                    if (state.status === 'playing' || state.status === 'loading') {
                        try {
                            await poseAI.send({ image: video });
                        } catch (e) {
                            console.warn("AI Frame Skip:", e);
                        }
                    }
                    requestAnimationFrame(tick);
                };
                tick();
                resolve();
            });
        });
    }

    // --- Flow Control Functions ---
    function startTimer() {
        if (state.timerInterval) clearInterval(state.timerInterval);
        state.timerInterval = setInterval(() => {
            state.timeLeft--;
            uiTime.innerText = state.timeLeft;
            
            if (state.timeLeft <= 0) {
                clearInterval(state.timerInterval);
                state.status = 'over';
                hud.classList.add('hidden');
                screenGameOver.classList.remove('hidden');
                document.getElementById('final-score').innerText = state.score;
                document.getElementById('final-missed').innerText = state.missed;
            }
        }, 1000);
    }

    async function initSystem() {
        debugLog.innerText = "Requesting camera access...";
        
        try {
            // 1. Native Camera Request
            const stream = await navigator.mediaDevices.getUserMedia({ 
                video: { width: 1280, height: 720, facingMode: "user" } 
            });
            video.srcObject = stream;
            
            screenStart.classList.add('hidden');
            screenLoading.classList.remove('hidden');

            // 2. Initialize MediaPipe
            poseAI = new Pose({ locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/pose/${file}` });
            poseAI.setOptions({
                modelComplexity: 1, 
                smoothLandmarks: true, 
                enableSegmentation: true,
                smoothSegmentation: true, 
                minDetectionConfidence: 0.5, 
                minTrackingConfidence: 0.5
            });
            poseAI.onResults(onPoseResults);

            // 3. Start processing loop
            await startCameraLoop();

        } catch (err) {
            logError(err.name + ": " + err.message);
        }
    }

    // --- Setup Listeners ---
    document.getElementById('start-btn').addEventListener('click', initSystem);
    
    document.getElementById('play-again-btn').addEventListener('click', () => {
        screenGameOver.classList.add('hidden');
        state.score = 0; state.missed = 0; state.timeLeft = 120;
        uiScore.innerText = "0"; uiMissed.innerText = "0";
        state.status = 'playing';
        hud.classList.remove('hidden');
        startTimer();
        spawnBall();
    });

    // Start drawing loop immediately
    requestAnimationFrame(draw);

</script>
</body>
</html>
